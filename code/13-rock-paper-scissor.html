<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/13-rock-paper-scissors.css">
  </head>
  <body>
    <div class="container">
      <h1 class="title">Rock Paper Scissors</h1>

      <div class="moves">
        <button onclick="playGame('rock')" class="move-button" aria-label="Rock">
          <img class="move-icon" src="image/rock-emoji.png" alt="Rock">
          <span class="move-label">Rock</span>
        </button>
        <button onclick="playGame('paper')" class="move-button" aria-label="Paper">
          <img class="move-icon" src="image/paper-emoji.png" alt="Paper">
          <span class="move-label">Paper</span>
        </button>
        <button onclick="playGame('scissors')" class="move-button" aria-label="Scissors">
          <img class="move-icon" src="image/scissors-emoji.png" alt="Scissors">
          <span class="move-label">Scissors</span>
        </button>
      </div>

      <p class="js-result result"></p>

      <p class="js-move move-display"></p>

      <p class="js-score score"></p>

      <div class="actions">
        <button onclick="resetScore()" class="reset-score-button">
          Reset Score
        </button>
        <button class="auto-play-button" onclick="autoPlay()">Auto Play</button>
      </div>
    </div>

    <script src="scripts/13-rock-paper-scissor.js"></script>
  </body>
</html>
